{% extends "base.html" %}
{% block content %}

<h3>健身计划</h3>

<div class="d-flex gap-2 mb-3">
    <a class="btn btn-primary" href="{{ url_for('add_plan') }}">添加计划</a>
    <a class="btn btn-warning" href="{{ url_for('generate_plan') }}">一键生成智能训练计划</a>
</div>

<table class="table table-bordered table-hover">
    <tr>
        <th>计划名称</th>
        <th>训练动作</th>
        <th>组数</th>
        <th>次数</th>
        <th>重量</th>
        <th>完成情况</th>
        <th>操作</th>
    </tr>

    {% for p in plans %}
    <tr>
        <td>{{ p.plan_name }}</td>
        <td>{{ p.action }}</td>
        <td>{{ p.sets }}</td>
        <td>{{ p.reps }}</td>
        <td>{{ p.weight }} kg</td>
        <td>
            {% if p.is_completed %}
                <span class="badge bg-success">已完成</span>
            {% else %}
                <span class="badge bg-secondary">未完成</span>
            {% endif %}
        </td>
        <td>
            <a class="btn btn-sm btn-success" href="{{ url_for('complete_plan', plan_id=p.id) }}">切换完成</a>
            <a class="btn btn-sm btn-warning" href="{{ url_for('edit_plan', plan_id=p.id) }}">编辑</a>
            <a class="btn btn-sm btn-danger" href="{{ url_for('delete_plan', plan_id=p.id) }}" onclick="return confirm('确定删除吗？')">删除</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
