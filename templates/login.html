{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">学生登录</h3>

                <form method="post" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input class="form-control" type="text" name="username" placeholder="请输入用户名" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input class="form-control" type="password" name="password" placeholder="请输入密码" required>
                    </div>

                    <button class="btn btn-primary w-100" type="submit">登录</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('register') }}">注册</a>
                    <span class="mx-2">|</span>
                    <a href="{{ url_for('admin_login') }}">管理员登录</a>
                </div>

                <div class="alert alert-info mt-3 mb-0">
                    测试学生账号：test / 123456
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
