

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新增食物</title>
</head>
<body>
    <h1>新增食物</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="post">
        <p>食物名称：<input type="text" name="food_name"></p>
        <p>类别：<input type="text" name="category"></p>
        <p>热量：<input type="number" step="0.1" name="calories"></p>
        <p>蛋白质：<input type="number" step="0.1" name="protein"></p>
        <p>碳水：<input type="number" step="0.1" name="carbohydrate"></p>
        <p>脂肪：<input type="number" step="0.1" name="fat"></p>
        <p>备注：<input type="text" name="remarks"></p>
        <p><button type="submit">保存</button></p>
    </form>

    <p><a href="{{ url_for('foods') }}">返回食物库列表</a></p>
</body>
</html>
