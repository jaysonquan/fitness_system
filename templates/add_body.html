{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <h3 class="mb-4">添加身体指标</h3>

                <form method="post" action="{{ url_for('add_body') }}">
                    <div class="mb-3">
                        <label class="form-label">日期</label>
                        <input class="form-control" type="date" name="date" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">体重 (kg)</label>
                        <input class="form-control" type="number" step="0.1" name="weight" placeholder="如：75" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">腰围 (cm)</label>
                        <input class="form-control" type="number" step="0.1" name="waist" placeholder="如：80">
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit">保存</button>
                        <a class="btn btn-secondary" href="{{ url_for('bodies') }}">返回列表</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
