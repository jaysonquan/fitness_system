{% extends "base.html" %}
{% block content %}

<h3>个人信息</h3>

<form method="post" class="card p-4 shadow-sm">
    <label>年龄</label>
    <input class="form-control mb-3" name="age" value="{{ user.age or '' }}">

    <label>身高 cm</label>
    <input class="form-control mb-3" name="height" value="{{ user.height or '' }}">

    <label>体重 kg</label>
    <input class="form-control mb-3" name="weight" value="{{ user.weight or '' }}">

    <label>健身目标</label>
    <select class="form-control mb-3" name="goal">
        <option value="减脂" {% if user.goal == "减脂" %}selected{% endif %}>减脂</option>
        <option value="增肌" {% if user.goal == "增肌" %}selected{% endif %}>增肌</option>
        <option value="塑形" {% if user.goal == "塑形" %}selected{% endif %}>塑形</option>
    </select>

    <button class="btn btn-primary">保存</button>
</form>

{% endblock %}
