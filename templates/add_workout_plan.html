<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新增健身计划</title>
</head>
<body>
    <h1>新增健身计划</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="post">
        <p>计划名称：<input type="text" name="plan_name"></p>
        <p>
            健身目标：
            <select name="goal_type">
                <option value="">请选择</option>
                <option value="减脂">减脂</option>
                <option value="增肌">增肌</option>
                <option value="保持体态">保持体态</option>
                <option value="提升体能">提升体能</option>
            </select>
        </p>
        <p>
            适用水平：
            <select name="level_type">
                <option value="">请选择</option>
                <option value="新手">新手</option>
                <option value="一般">一般</option>
                <option value="有经验">有经验</option>
            </select>
        </p>
        <p>每周训练次数：<input type="number" name="weekly_frequency" min="1" max="7"></p>
        <p>计划内容：<textarea name="content" rows="6" cols="60"></textarea></p>
        <p>备注：<input type="text" name="remarks"></p>
        <p><button type="submit">保存计划</button></p>
    </form>

    <p><a href="{{ url_for('workout_plans') }}">返回健身计划列表</a></p>
</body>
</html>
