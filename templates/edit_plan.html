{% extends "base.html" %}
{% block content %}

<h3>编辑健身计划</h3>

<form method="post" class="card p-4 shadow-sm">
    <label>计划名称</label>
    <input class="form-control mb-3" name="plan_name" value="{{ plan.plan_name }}" required>

    <label>训练动作</label>
    <input class="form-control mb-3" name="action" value="{{ plan.action }}" required>

    <label>目标组数</label>
    <input class="form-control mb-3" type="number" name="sets" value="{{ plan.sets }}">

    <label>目标次数</label>
    <input class="form-control mb-3" type="number" name="reps" value="{{ plan.reps }}">

    <label>目标重量 kg</label>
    <input class="form-control mb-3" type="number" step="0.5" name="weight" value="{{ plan.weight }}">

    <button class="btn btn-primary">保存修改</button>
</form>

{% endblock %}
