

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新增训练记录</title>
</head>
<body>
    <h1>新增训练记录</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="post">
        <p>训练日期：<input type="date" name="workout_date"></p>
        <p>训练项目：<input type="text" name="workout_item"></p>
        <p>训练时长（分钟）：<input type="number" name="duration_minutes"></p>
        <p>
            完成情况：
            <select name="completion_status">
                <option value="">请选择</option>
                <option value="已完成">已完成</option>
                <option value="部分完成">部分完成</option>
                <option value="未完成">未完成</option>
            </select>
        </p>
        <p>消耗热量：<input type="number" step="0.1" name="calories_burned"></p>
        <p>备注：<input type="text" name="remarks"></p>
        <p><button type="submit">保存</button></p>
    </form>

    <p><a href="{{ url_for('workout_records') }}">返回训练记录列表</a></p>
</body>
</html>
