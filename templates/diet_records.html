{% extends "base.html" %}
{% block content %}

<h3 class="mb-3">饮食记录</h3>

<a class="btn btn-success mb-3" href="{{ url_for('add_diet') }}">添加饮食记录</a>

<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-bordered table-hover bg-white">
            <thead class="table-light">
                <tr>
                    <th>日期</th>
                    <th>食物名称</th>
                    <th>摄入量</th>
                    <th>热量</th>
                </tr>
            </thead>
            <tbody>
                {% for r in records %}
                <tr>
                    <td>{{ r.date }}</td>
                    <td>{{ r.food_name }}</td>
                    <td>{{ r.amount }}</td>
                    <td>{{ r.calories }} kcal</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center text-muted">暂无饮食记录</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
