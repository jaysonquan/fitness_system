<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生注册</title>
</head>
<body>
    <h1>学生注册</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="post">
        <p>用户名：<input type="text" name="username"></p>
        <p>密码：<input type="password" name="password"></p>
        <p>姓名：<input type="text" name="real_name"></p>
        <p>
            性别：
            <select name="gender">
                <option value="">请选择</option>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </p>
        <p>年龄：<input type="number" name="age"></p>
        <p>身高（cm）：<input type="number" step="0.1" name="height"></p>
        <p>体重（kg）：<input type="number" step="0.1" name="weight"></p>
        <p>
            运动基础：
            <select name="fitness_level">
                <option value="">请选择</option>
                <option value="新手">新手</option>
                <option value="一般">一般</option>
                <option value="有经验">有经验</option>
            </select>
        </p>
        <p>每周训练天数：<input type="number" name="weekly_days" min="1" max="7"></p>
        <p>
            健身目标：
            <select name="goal_type">
                <option value="">请选择</option>
                <option value="减脂">减脂</option>
                <option value="增肌">增肌</option>
                <option value="保持体态">保持体态</option>
                <option value="提升体能">提升体能</option>
            </select>
        </p>
        <p><button type="submit">注册</button></p>
    </form>

    <p><a href="{{ url_for('student_login') }}">已有账号，去登录</a></p>
    <p><a href="{{ url_for('index') }}">返回首页</a></p>
</body>
</html>
